<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071524"/>
      <stop offset="1" stop-color="#0c2038"/>
    </linearGradient>
    <linearGradient id="mark" x1="14" y1="16" x2="42" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.45" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="56" height="56" rx="13" fill="url(#bg)"/>

  <!-- Border ring -->
  <rect x="1" y="1" width="54" height="54" rx="12" stroke="rgba(56,189,248,0.4)" stroke-width="1.5"/>

  <!-- Corner accent dots -->
  <circle cx="10" cy="10" r="1.5" fill="rgba(56,189,248,0.45)"/>
  <circle cx="46" cy="46" r="1.5" fill="rgba(56,189,248,0.45)"/>

  <!-- Wave-N mark: left bar + S-curve diagonal + right bar -->
  <path d="M14 40 L14 16 C19 25 23 21 28 27 C33 33 37 29 42 40 L42 16"
        stroke="url(#mark)"
        stroke-width="3.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Small accent wave below -->
  <path d="M18 44 Q23 41 28 44 Q33 47 38 44"
        stroke="rgba(56,189,248,0.4)"
        stroke-width="1.5"
        stroke-linecap="round"
        fill="none"/>
</svg>
