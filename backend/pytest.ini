[pytest]
minversion = 7.0
testpaths = tests
pythonpath = .
asyncio_mode = auto
addopts =
    -ra
    -q
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    -vv

markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    requires_db: Tests that require database
    requires_redis: Tests that require Redis
