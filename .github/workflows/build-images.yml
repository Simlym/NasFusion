name: Build & Push Images

# ==============================================================================
# 构建多架构镜像（linux/amd64, linux/arm64）并推送到：
#   - Docker Hub (docker.io)            —— 首选仓库
#   - GitHub Container Registry (ghcr.io) —— 备用仓库
#
# 用户无需再在 NAS 上本地编译，docker compose pull 即可使用。
# ==============================================================================

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

env:
  # 镜像名称（不含仓库前缀），如 nasfusion-backend / nasfusion-nginx
  IMAGE_BACKEND: nasfusion-backend
  IMAGE_NGINX: nasfusion-nginx

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # 推送到 ghcr.io 需要
    # 把 secrets 映射到 env：GitHub 不允许在 step 的 if: 里直接引用 secrets，
    # 需经 env 中转。未配置 Docker Hub 时 DOCKERHUB_USERNAME 为空，相关步骤自动跳过。
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image_env: IMAGE_BACKEND
          - name: nginx
            context: .
            dockerfile: ./nginx/Dockerfile
            image_env: IMAGE_NGINX

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ---- 登录 Docker Hub（首选仓库；需配置 secrets，未配置则跳过）----
      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      # ---- 登录 GHCR（备用仓库；凭据为内置 GITHUB_TOKEN，始终启用）----
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- 计算镜像标签：Docker Hub 优先，GHCR 兜底 ----
      - name: Compose image references
        id: images
        run: |
          IMG="${{ matrix.name == 'backend' && env.IMAGE_BACKEND || env.IMAGE_NGINX }}"
          REFS=""
          # DOCKERHUB_USERNAME 由 job 级 env 注入，run 步骤可直接用 shell 变量
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            REFS="${DOCKERHUB_USERNAME}/${IMG}"
          fi
          # GHCR 始终推送（备用源）
          if [ -n "$REFS" ]; then
            REFS="${REFS}\nghcr.io/${{ github.repository_owner }}/${IMG}"
          else
            REFS="ghcr.io/${{ github.repository_owner }}/${IMG}"
          fi
          # 转成 docker/metadata-action 需要的多行字符串（用真实换行）
          printf "list<<EOF\n%b\nEOF\n" "$REFS" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            # 打 v* tag 发版时：生成版本号标签（如 v0.2.0）并更新 latest
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # main 日常 push：只生成 edge（供尝鲜/自测），不动 latest
            type=raw,value=edge,enable={{is_default_branch}}
            # 始终带 commit 短 sha，便于精确回滚/排查
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 把版本号（tag 名如 v0.2.0，main 分支为 edge）注入后端镜像，
          # backend 的 Dockerfile 会将其写入 APP_VERSION 环境变量；
          # nginx 镜像无此 ARG，多传无副作用。
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
