# ==============================================================================
# NasFusion Docker Compose - 群晖 NAS 优化配置
# ==============================================================================
# 使用说明：
# 1. 适用于群晖 DSM 7.x 系统
# 2. 复制 .env.example 为 .env 并修改配置
# 3. 设置正确的 PUID/PGID（执行 `id` 命令查看，admin 通常是 1024:100）
# 4. 运行：docker-compose -f docker-compose.nas.yml up -d
# ==============================================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: nasfusion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_POSTGRES_USER:-nasfusion}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:?请设置数据库密码}
      POSTGRES_DB: ${DB_POSTGRES_DB:-nasfusion}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ${DATA_PATH:-./data}/postgres:/var/lib/postgresql/data
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"  # 外部访问端口（默认5432，建议改为5433避免冲突）
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_POSTGRES_USER:-nasfusion}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nasfusion-network
    # 群晖 Docker 不支持 CPU/内存限制，已注释
    # mem_limit: 4g
    # mem_reservation: 512m
    # cpus: 2.0

    labels:
      - "io.portainer.category=Media Management"
      - "io.portainer.description=NasFusion PostgreSQL Database"

  redis:
    image: redis:7-alpine
    container_name: nasfusion-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ${DATA_PATH:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - nasfusion-network
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    # 群晖 Docker 不支持 CPU/内存限制，已注释
    # mem_limit: 512m
    # mem_reservation: 256m
    # cpus: 0.5

    labels:
      - "io.portainer.category=Media Management"
      - "io.portainer.description=NasFusion Redis Cache"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PUID: ${PUID:-1024}
        PGID: ${PGID:-100}
    image: nasfusion/backend:latest
    container_name: nasfusion-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # ===== 应用配置 =====
      APP_NAME: ${APP_NAME:-NasFusion}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DEBUG: ${DEBUG:-false}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-["*"]}

      # ===== 安全配置 =====
      SECRET_KEY: ${SECRET_KEY:?请在 .env 中设置 SECRET_KEY（至少32字符）}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?请在 .env 中设置 JWT_SECRET_KEY（至少32字符）}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}

      # ===== 数据库配置 =====
      DB_TYPE: ${DB_TYPE:-postgresql}
      # PostgreSQL 连接配置（Docker 网络中使用容器服务名）
      DB_POSTGRES_SERVER: ${DB_POSTGRES_SERVER:-postgres}
      DB_POSTGRES_USER: ${DB_POSTGRES_USER:-nasfusion}
      DB_POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:?请在 .env 中设置数据库密码}
      DB_POSTGRES_DB: ${DB_POSTGRES_DB:-nasfusion}
      DB_POSTGRES_PORT: ${DB_POSTGRES_PORT:-5432}

      # ===== Redis 配置 =====
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}

      # ===== 文件路径配置（容器内路径） =====
      TORRENT_PATH: /app/data/torrents
      LOG_PATH: /app/data/logs



      # ===== 日志配置 =====
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      
      # ===== 时区配置 =====
      TZ: ${TZ:-Asia/Shanghai}

      # ===== 用户权限 =====
      PUID: ${PUID:-1024}
      PGID: ${PGID:-100}
      
      # ===== 存储卷配置（用于 UI 显示和路径映射）=====
      VOLUME_1_PATH: ${VOLUME_1_PATH:-/volume1}
      VOLUME_2_PATH: ${VOLUME_2_PATH:-}
      VOLUME_3_PATH: ${VOLUME_3_PATH:-}
      VOLUME_4_PATH: ${VOLUME_4_PATH:-}
      
      # 卷挂载基础目录（容器内）
      VOLUME_MOUNTS_BASE: /mnt
    volumes:
      # ===== 应用数据目录 =====
      - ${LOG_PATH:-./data/logs}:/app/data/logs
      - ${CACHE_PATH:-./data/cache}:/app/data/cache
      - ${TORRENT_PATH:-./data/torrents}:/app/data/torrents
      
      # ===== 存储卷挂载（支持硬链接的关键！）=====
      # 说明：
      # - 将整个卷挂载到 /mnt/volumeN，而不是分别挂载子目录
      # - 这样同一卷内的下载目录和媒体库共享设备ID，支持硬链接
      # - 用户在 Web 界面"存储设置"中配置具体使用的目录
      #
      # 主存储卷（必须配置）
      - ${VOLUME_1_PATH:-/dev/null}:/mnt/volume1
      # 扩展存储卷（可选，根据实际情况启用）
      - ${VOLUME_2_PATH:-/dev/null}:/mnt/volume2
      - ${VOLUME_3_PATH:-/dev/null}:/mnt/volume3
      - ${VOLUME_4_PATH:-/dev/null}:/mnt/volume4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - nasfusion-network
    # 群晖 Docker 不支持 CPU/内存限制，已注释
    # mem_limit: 4g
    # mem_reservation: 1g
    # cpus: 2.0

    labels:
      - "io.portainer.category=Media Management"
      - "io.portainer.description=NasFusion Backend API"
      - "io.portainer.icon=https://raw.githubusercontent.com/your-repo/NasFusion/main/docs/images/logo.png"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: nasfusion/frontend:latest
    container_name: nasfusion-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks:
      - nasfusion-network
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    # 群晖 Docker 不支持 CPU/内存限制，已注释
    # mem_limit: 256m
    # cpus: 0.5

    labels:
      - "io.portainer.category=Media Management"
      - "io.portainer.description=NasFusion Frontend UI"

  nginx:
    image: nginx:alpine
    container_name: nasfusion-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - nasfusion-network
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    # 群晖 Docker 不支持 CPU/内存限制，已注释
    # mem_limit: 256m
    # cpus: 0.5

    labels:
      - "io.portainer.category=Media Management"
      - "io.portainer.description=NasFusion Reverse Proxy"

networks:
  nasfusion-network:
    driver: bridge