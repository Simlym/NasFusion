# ==============================================================================
# NasFusion Docker Compose —— 用户部署版（拉取预构建镜像，无需本地编译）
# ==============================================================================
# 使用说明：
# 1. 复制 .env.example 为 .env 并修改配置
# 2. 设置正确的 PUID/PGID（执行 `id` 命令查看，群晖 admin 通常是 1024:100）
# 3. 启动：docker compose up -d
#
# 镜像源切换（中国大陆推荐用阿里云加速）：
#   在 .env 中设置 IMAGE_REGISTRY，例如：
#     - GHCR（默认/海外）:   IMAGE_REGISTRY=ghcr.io/simlym
#     - 阿里云（国内直连）:   IMAGE_REGISTRY=registry.cn-hangzhou.aliyuncs.com/simlym
#     - Docker Hub:          IMAGE_REGISTRY=docker.io/simlym
#
# 开发/本地编译请使用 docker-compose.build.yml
# ==============================================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: nasfusion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_POSTGRES_USER:-nasfusion}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:?请设置数据库密码}
      POSTGRES_DB: ${DB_POSTGRES_DB:-nasfusion}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ${DATA_PATH:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_POSTGRES_USER:-nasfusion}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nasfusion-network
    labels:
      - "io.portainer.category=Media Management"
      - "io.portainer.description=NasFusion PostgreSQL Database"

  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io/simlym}/nasfusion-backend:${IMAGE_TAG:-latest}
    container_name: nasfusion-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # ===== 应用配置 =====
      APP_NAME: ${APP_NAME:-NasFusion}
      # APP_VERSION 由镜像构建时注入（取自 Git tag），此处不覆盖
      DEBUG: ${DEBUG:-false}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-["*"]}

      # ===== 安全配置 =====
      SECRET_KEY: ${SECRET_KEY:?请在 .env 中设置 SECRET_KEY（至少32字符）}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?请在 .env 中设置 JWT_SECRET_KEY（至少32字符）}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}

      # ===== 数据库配置 =====
      DB_TYPE: ${DB_TYPE:-postgresql}
      DB_POSTGRES_SERVER: ${DB_POSTGRES_SERVER:-postgres}
      DB_POSTGRES_USER: ${DB_POSTGRES_USER:-nasfusion}
      DB_POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:?请在 .env 中设置数据库密码}
      DB_POSTGRES_DB: ${DB_POSTGRES_DB:-nasfusion}
      DB_POSTGRES_PORT: ${DB_POSTGRES_PORT:-5432}

      # ===== 文件路径配置（容器内路径） =====
      TORRENT_PATH: /app/data/torrents
      LOG_PATH: /app/data/logs

      # ===== 日志配置 =====
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}

      # ===== 时区配置 =====
      TZ: ${TZ:-Asia/Shanghai}

      # ===== 用户权限 =====
      PUID: ${PUID:-1024}
      PGID: ${PGID:-100}

      # ===== 存储卷配置（用于 UI 显示和路径映射）=====
      VOLUME_1_PATH: ${VOLUME_1_PATH:-/volume1}
      VOLUME_2_PATH: ${VOLUME_2_PATH:-}
      VOLUME_3_PATH: ${VOLUME_3_PATH:-}
      VOLUME_4_PATH: ${VOLUME_4_PATH:-}
      VOLUME_MOUNTS_BASE: /mnt
    volumes:
      # ===== 应用数据目录 =====
      - ${LOG_PATH:-./data/logs}:/app/data/logs
      - ${CACHE_PATH:-./data/cache}:/app/data/cache
      - ${TORRENT_PATH:-./data/torrents}:/app/data/torrents

      # ===== 存储卷挂载（支持硬链接的关键！）=====
      # 将整个卷挂载到 /mnt/volumeN，同一卷内下载目录与媒体库共享设备ID，支持硬链接
      - ${VOLUME_1_PATH:-/dev/null}:/mnt/volume1
      - ${VOLUME_2_PATH:-/dev/null}:/mnt/volume2
      - ${VOLUME_3_PATH:-/dev/null}:/mnt/volume3
      - ${VOLUME_4_PATH:-/dev/null}:/mnt/volume4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - nasfusion-network
    labels:
      - "io.portainer.category=Media Management"
      - "io.portainer.description=NasFusion Backend API"

  # 网关：前端静态文件 + 反向代理（已合并原 frontend 容器）
  nginx:
    image: ${IMAGE_REGISTRY:-ghcr.io/simlym}/nasfusion-nginx:${IMAGE_TAG:-latest}
    container_name: nasfusion-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - nasfusion-network
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    labels:
      - "io.portainer.category=Media Management"
      - "io.portainer.description=NasFusion Gateway (Frontend + Reverse Proxy)"

networks:
  nasfusion-network:
    driver: bridge
